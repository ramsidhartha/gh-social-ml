[pytest]
# Pytest configuration for trending service tests

# Test markers
markers =
    unit: marks tests as unit tests (fast, no external dependencies)
    integration: marks tests as integration tests (requires database)
    slow: marks tests as slow (network calls, heavy computation)
    benchmark: marks tests as performance benchmarks

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short

# Coverage options (when using pytest-cov)
# These can be overridden with command-line arguments
# --cov=trending
# --cov-report=term-missing
# --cov-report=html
