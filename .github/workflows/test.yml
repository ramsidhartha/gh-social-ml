name: Test Trending Service

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-benchmark pytest-mock pytest-docker
    
    - name: Set up test environment
      run: |
        echo "GITHUB_TOKEN=test_token_12345" >> $GITHUB_ENV
        echo "DATABASE_URL=postgresql://test:test@localhost:5432/test_db" >> $GITHUB_ENV
        echo "TEST_DATABASE_URL=postgresql://test:test@localhost:5432/test_db" >> $GITHUB_ENV
    
    - name: Run unit tests
      env:
        GITHUB_TOKEN: test_token_12345
        DATABASE_URL: postgresql://test:test@localhost:5432/test_db
        TEST_DATABASE_URL: postgresql://test:test@localhost:5432/test_db
      run: |
        pytest tests/ -m "unit" -v --cov=trending --cov-report=xml --cov-report=term-missing
    
    - name: Run integration tests
      env:
        GITHUB_TOKEN: test_token_12345
        DATABASE_URL: postgresql://test:test@localhost:5432/test_db
        TEST_DATABASE_URL: postgresql://test:test@localhost:5432/test_db
      run: |
        pytest tests/ -m "integration" -v
    
    - name: Run performance benchmarks
      env:
        GITHUB_TOKEN: test_token_12345
        DATABASE_URL: postgresql://test:test@localhost:5432/test_db
        TEST_DATABASE_URL: postgresql://test:test@localhost:5432/test_db
      run: |
        pytest tests/ -m "unit" --benchmark-only --benchmark-autosave
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
    
    - name: Upload benchmark results
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results
        path: .benchmarks/
